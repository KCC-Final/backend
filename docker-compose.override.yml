# ============================================================
# docker-compose.override.yml
# - 로컬 개발 환경 전용 설정
# - docker-compose up 시 자동으로 병합
# - .env 파일을 연결해 로컬 전용 변수 사용
# ============================================================

version: "3.8"

services:
  nginx:
    # --------------------------------------------------------
    # 🌐 Nginx (로컬 리버스 프록시)
    # --------------------------------------------------------
    container_name: groo-nginx-local
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.local.conf:/etc/nginx/conf.d/default.conf
      - ./logs:/var/log/nginx
    extra_hosts:
      # ✅ STS / IntelliJ에서 실행 중인 Spring Boot 접근 허용
      - "host.docker.internal:host-gateway"

  backend:
    # --------------------------------------------------------
    # ⚙️ 로컬 백엔드 (Spring Boot) 컨테이너 설정
    # --------------------------------------------------------
    env_file:
      - .env                       # ✅ 로컬 전용 환경 변수 파일 연결
    environment:
      - SPRING_PROFILES_ACTIVE=docker   # ✅ 도커 전용 프로파일 적용
    build:
      context: .                   # 현재 프로젝트 디렉토리
      dockerfile: Dockerfile
    volumes:
      - ./src:/app/src             # ✅ 코드 실시간 반영 (Hot Reload)
    depends_on:
      - groo-mysql
      - groo-redis
