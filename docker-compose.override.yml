# @author uyh
# 로컬 개발 환경용 오버라이드 설정
# docker-compose up 시 자동으로 적용됨
# STS로 Spring Boot 실행 시에도 Nginx가 접근 가능하도록 설정
version: '3.8'

services:
  nginx:
    container_name: groo-nginx-local
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.local.conf:/etc/nginx/conf.d/default.conf
      - ./logs:/var/log/nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"