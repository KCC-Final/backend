# 가상 호스트 서버 블록 정의
server {
    # HTTP 포트 80에서 수신 대기
    listen 80;
    
    # 서버 이름 설정 (도메인명 또는 IP)
    server_name localhost;

    # =================================================================
    # ALB 헬스체크 전용 경로 (가장 먼저 배치)
    # =================================================================
    location /health {
        proxy_pass http://app:8080/actuator/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 기존 설정 수정
    location /swagger-ui/ {  # 뒤에 슬래시 추가
        proxy_pass http://app:8080/swagger-ui/;  # 뒤에 슬래시 추가
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass http://app:8080/v3/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =================================================================
    # 정보나루 Open API 프록시 설정 (더 구체적인 매칭을 위해 먼저 배치)
    # =================================================================
    location /api/library/ {
        # 정보나루 API 서버로 프록시 (URL 경로에서 /api/library/ 제거)
        proxy_pass http://data4library.kr/api/;
        
        # 정보나루 서버로 올바른 Host 헤더 전송
        proxy_set_header Host data4library.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS 헤더 추가 (브라우저에서 접근 허용)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    }

    # =================================================================
    # 알라딘 Open API 프록시 설정 (CORS 해결)
    # =================================================================
    location /api/aladin/ {
        # 알라딘 API 서버로 프록시 (URL 경로에서 /api/aladin/ 제거)
        proxy_pass http://www.aladin.co.kr/ttb/api/;
        
        # 알라딘 서버로 올바른 Host 헤더 전송
        proxy_set_header Host www.aladin.co.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS 헤더 추가 (브라우저에서 접근 허용)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    }

    # =================================================================
    # 백엔드 Spring Boot API 프록시 설정 (더 일반적인 매칭을 나중에 배치)
    # =================================================================
    location /api/ {
        # Spring Boot 앱 컨테이너로 요청 전달 (Docker 네트워크 내부 통신)
        proxy_pass http://app:8080/;
        
        # 원본 호스트 헤더 유지
        proxy_set_header Host $host;
        
        # 실제 클라이언트 IP 전달
        proxy_set_header X-Real-IP $remote_addr;
        
        # 프록시 체인을 통과한 모든 IP 주소 전달
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 원본 프로토콜(HTTP/HTTPS) 정보 전달
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =================================================================
    # 정적 파일 서빙 (기본 nginx 페이지)
    # =================================================================
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 에러 페이지 설정
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}