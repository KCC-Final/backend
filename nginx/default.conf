# Ж░ђВЃЂ ьўИВіцьіИ Вёюв▓ё вИћвАЮ ВаЋВЮў
server {
    # HTTP ьЈгьіИ 80ВЌљВёю ВѕўВІа вїђЖИ░
    listen 80;
    
    # Вёюв▓ё ВЮ┤вдё ВёцВаЋ (вЈёвЕћВЮИвфЁ вўљвіћ IP)
    server_name api.groo.site;

    # =================================================================
    # ALB ьЌгВіцВ▓┤ьЂг ВаёВџЕ Ж▓йвАю (Ж░ђВъЦ ве╝Вађ в░░В╣ў)
    # =================================================================
    location /health {
        proxy_pass http://app:8080/actuator/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =================================================================
    # Swagger UI в░Ј API вгИВёю ьћёвАЮВІю ВёцВаЋ
    # =================================================================
    location /swagger-ui/ {
        proxy_pass http://app:8080/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass http://app:8080/v3/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =================================================================
    # ВаЋв│┤вѓўвБе Open API ьћёвАЮВІю ВёцВаЋ (ЖхгВ▓┤ВаЂ вДцВ╣Г - ве╝Вађ в░░В╣ў)
    # =================================================================
    location ^~ /api/data4library/ {
        proxy_pass http://data4library.kr/api/;
        proxy_set_header Host data4library.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OPTIONS ВџћВ▓Г В▓ўвдг
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # =================================================================
    # ВЋївЮ╝вћў Open API ьћёвАЮВІю ВёцВаЋ (CORS ьЋ┤Ж▓░)
    # =================================================================
    location ^~ /api/aladin/ {
        proxy_pass http://www.aladin.co.kr/ttb/api/;
        proxy_set_header Host www.aladin.co.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS ьЌцвЇћ ВХћЖ░ђ (ВЎИвХђ APIВџЕ)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        
        # OPTIONS ВџћВ▓Г В▓ўвдг
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # =================================================================
    # в░▒ВЌћвЊю Spring Boot API ьћёвАЮВІю ВёцВаЋ (CORSвіћ Spring BootВЌљВёю В▓ўвдг)
    # =================================================================
    location /api/ {
        proxy_pass http://app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Рџа№ИЈ CORS ьЌцвЇћвіћ Spring Boot ВаёВЌГ ВёцВаЋВЌљВёю В▓ўвдгьЋўв»ђвАю nginxВЌљВёювіћ ВХћЖ░ђьЋўВДђ ВЋіВЮї
    }

    # =================================================================
    # ВаЋВаЂ ьїїВЮ╝ Вёюв╣Ў (ЖИ░в│И nginx ьјўВЮ┤ВДђ)
    # =================================================================
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ВЌљвЪг ьјўВЮ┤ВДђ ВёцВаЋ
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
