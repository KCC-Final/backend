# nginx 워커 프로세스를 실행할 사용자 지정
user nginx;

# 워커 프로세스 수를 CPU 코어 수에 맞게 자동 설정
worker_processes auto;

# 에러 로그 파일 경로 및 로그 레벨 설정
error_log /var/log/nginx/error.log notice;

# nginx 마스터 프로세스 PID 파일 경로
pid /var/run/nginx.pid;

# 이벤트 처리 설정
events {
    # 각 워커 프로세스가 동시에 처리할 수 있는 최대 연결 수
    worker_connections 1024;
}

# HTTP 서버 설정
http {
    # MIME 타입 설정 파일 포함
    include /etc/nginx/mime.types;
    
    # 기본 MIME 타입 설정
    default_type application/octet-stream;

    # 액세스 로그 포맷 정의
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 액세스 로그 파일 경로 및 포맷 설정
    access_log /var/log/nginx/access.log main;

    # 파일 전송 최적화 (sendfile 시스템 콜 사용)
    sendfile on;
    
    # TCP_NOPUSH 소켓 옵션 활성화 (성능 향상)
    tcp_nopush on;
    
    # 클라이언트 연결 유지 시간 (초)
    keepalive_timeout 65;
    
    # gzip 압축 활성화 (대역폭 절약)
    gzip on;

    # conf.d 디렉토리의 모든 .conf 파일 포함
    include /etc/nginx/conf.d/*.conf;
}