# @author uyh
# ===============================================
# Backend CI/CD 워크플로우
# - main / develop / 테스트 브랜치에 push 시 동작
# - main 브랜치로의 PR 시에도 동작
# - 빌드 → Docker Hub 푸시 → EC2 배포 자동화
# ===============================================

name: Backend CI/CD

on:
  push:
    branches: ["main", "develop", "feat/17/CI/CD테스트브랜치"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            risania/groo-backend:latest
            risania/groo-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create nginx and database directories and grant permission
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sudo mkdir -p /home/ubuntu/groo/nginx
            sudo mkdir -p /home/ubuntu/groo/database
            sudo chown -R ubuntu:ubuntu /home/ubuntu/groo

      - name: Copy config files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "nginx/nginx.conf,nginx/default.conf,database/"
          target: "/home/ubuntu/groo"
          overwrite: true

      - name: Verify copied files on EC2
        uses: appleboy/ssh-action@v1.0.0
        
        # ✅ 여기에 추가 (GitHub Secrets → runner 환경변수 export)
        env:
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_SMTP_AUTH: ${{ secrets.MAIL_SMTP_AUTH }}
          MAIL_STARTTLS_ENABLE: ${{ secrets.MAIL_STARTTLS_ENABLE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_TOKEN_EXPIRATION: ${{ secrets.EMAIL_TOKEN_EXPIRATION }}
          PASSWORD_TOKEN_EXPIRATION: ${{ secrets.PASSWORD_TOKEN_EXPIRATION }}
          NEXT_PUBLIC_ALADIN_TTBKEY: ${{ secrets.NEXT_PUBLIC_ALADIN_TTBKEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "--- Checking contents of /home/ubuntu/groo ---"
            ls -alR /home/ubuntu/groo

      - name: Deploy containers to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22

          # ============================================================
          # ✅ GitHub Secrets 환경변수 목록
          # - CI/CD 실행 시 이 변수들이 EC2에 전달됨
          # - docker run 명령에서 ${변수명}으로 사용 가능
          # ============================================================
          envs: |
            MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,
            MAIL_SMTP_AUTH,MAIL_STARTTLS_ENABLE,
            JWT_SECRET,EMAIL_TOKEN_EXPIRATION,PASSWORD_TOKEN_EXPIRATION,
            NEXT_PUBLIC_ALADIN_TTBKEY,DB_PASSWORD,DB_ROOT_PASSWORD,REDIS_PASSWORD

          script: |
            # ====================================================================
            # 1) Docker 네트워크 생성
            # ====================================================================
            docker network create groo-network || true

            # ====================================================================
            # 2) 기존 컨테이너 중지 및 삭제
            # ====================================================================
            docker stop groo-nginx groo-backend groo-mysql groo-redis 2>/dev/null || true
            docker rm groo-nginx groo-backend groo-mysql groo-redis 2>/dev/null || true

            # ====================================================================
            # 3) 오래된 이미지 정리
            # ====================================================================
            docker image prune -f

            # ====================================================================
            # 4) 최신 backend 이미지 Pull
            # ====================================================================
            docker pull risania/groo-backend:latest

            # ====================================================================
            # 5) MySQL 컨테이너 실행
            # ====================================================================
            docker run -d \
              --name groo-mysql \
              -p 3306:3306 \
              --network groo-network \
              -v groo-mysql-data:/var/lib/mysql \
              -e MYSQL_ROOT_PASSWORD='${{ secrets.DB_ROOT_PASSWORD }}' \
              -e MYSQL_DATABASE=kcc \
              -e MYSQL_USER=kcc \
              -e MYSQL_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              --restart unless-stopped \
              mysql:8.0 \
              --default-authentication-plugin=mysql_native_password \
              --character-set-server=utf8mb4 \
              --collation-server=utf8mb4_unicode_ci \
              --skip-character-set-client-handshake \
              --default-time-zone=+09:00

            # ====================================================================
            # 6) Redis 컨테이너 실행
            # ====================================================================
            docker run -d \
              --name groo-redis \
              -p 6379:6379 \
              --network groo-network \
              -v groo-redis-data:/data \
              -e TZ=Asia/Seoul \
              --restart unless-stopped \
              redis:7.0-alpine redis-server --appendonly yes

            # ====================================================================
            # 7) DB와 Redis 기동 대기
            # ====================================================================
            echo "Waiting for database and redis to start..."
            sleep 15

            # ====================================================================
            # 8) Backend 컨테이너 실행
            # ====================================================================
            DB_URL="jdbc:mysql://groo-mysql:3306/kcc?useUnicode=true&serverTimezone=Asia/Seoul"
            docker run -d \
              --name groo-backend \
              --network groo-network \
              -p 8080:8080 \
              -e TZ=Asia/Seoul \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e "spring.datasource.url=${DB_URL}" \
              -e spring.datasource.username=kcc \
              -e "spring.datasource.password=${{ secrets.DB_PASSWORD }}" \
              -e SPRING_DATA_REDIS_HOST=groo-redis \
              -e "SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" \
              -e MAIL_HOST="${MAIL_HOST}" \
              -e MAIL_PORT="${MAIL_PORT}" \
              -e MAIL_USERNAME="${MAIL_USERNAME}" \
              -e MAIL_PASSWORD="${MAIL_PASSWORD}" \
              -e MAIL_SMTP_AUTH="${MAIL_SMTP_AUTH}" \
              -e MAIL_STARTTLS_ENABLE="${MAIL_STARTTLS_ENABLE}" \
              -e JWT_SECRET="${JWT_SECRET}" \
              -e EMAIL_TOKEN_EXPIRATION="${EMAIL_TOKEN_EXPIRATION}" \
              -e PASSWORD_TOKEN_EXPIRATION="${PASSWORD_TOKEN_EXPIRATION}" \
              -e NEXT_PUBLIC_ALADIN_TTBKEY="${NEXT_PUBLIC_ALADIN_TTBKEY}" \
              --restart unless-stopped \
              risania/groo-backend:latest


            # ====================================================================
            # 9) Backend 기동 대기 및 로그 확인
            # ====================================================================
            echo "Waiting for application to start..."
            sleep 20
            echo "=== Backend container status ==="
            docker ps -a | grep groo-backend
            echo "=== Backend container logs ==="
            docker logs groo-backend --tail 50

            # ====================================================================
            # 10) DB 초기화 및 마이그레이션 실행
            # ====================================================================
            echo "=== Starting database initialization and migration ==="

            if [ -f "/home/ubuntu/groo/database/init_codes.sql" ]; then
              echo "Copying init_codes.sql into container..."
              docker cp /home/ubuntu/groo/database/init_codes.sql groo-mysql:/init_codes.sql
              echo "Executing init_codes.sql..."
              docker exec groo-mysql mysql -u kcc -p'${{ secrets.DB_PASSWORD }}' kcc --default-character-set=utf8mb4 -e "source /init_codes.sql"
              echo "Initial database setup completed!"
            else
              echo "init_codes.sql not found, skipping..."
            fi

            echo "Executing database migrations..."
            migration_executed=false
            for migration_file in /home/ubuntu/groo/database/migration_*.sql; do
              if [ -f "$migration_file" ]; then
                echo "Copying $(basename $migration_file) into container..."
                docker cp "$migration_file" groo-mysql:/$(basename $migration_file)
                echo "Executing $(basename $migration_file)..."
                docker exec groo-mysql mysql -u kcc -p'${{ secrets.DB_PASSWORD }}' kcc --default-character-set=utf8mb4 -e "source /$(basename $migration_file)"
                echo "$(basename $migration_file) completed successfully!"
                migration_executed=true
              fi
            done

            if [ "$migration_executed" = false ]; then
              echo "No migration files found, skipping migration step..."
            else
              echo "All database migrations completed successfully!"
            fi

            echo "=== Database initialization and migration finished ==="

            # ====================================================================
            # 11) Nginx 컨테이너 실행
            # ====================================================================
            docker run -d \
              --name groo-nginx \
              --network groo-network \
              -p 80:80 -p 443:443 \
              -e TZ=Asia/Seoul \
              -v /home/ubuntu/groo/nginx/nginx.conf:/etc/nginx/nginx.conf \
              -v /home/ubuntu/groo/nginx/default.conf:/etc/nginx/conf.d/default.conf \
              --restart unless-stopped \
              nginx:alpine

            # ====================================================================
            # 12) 헬스 체크
            # ====================================================================
            echo "Waiting for nginx to start..."
            sleep 10

            echo "=== Checking container status ==="
            docker ps -a | grep groo

            echo "=== Starting health check ==="
            for i in {1..12}; do
              echo "Health check attempt $i/12..."
              if curl --fail http://localhost/health 2>/dev/null; then
                echo "Application started successfully via nginx!"
                exit 0
              fi
              echo "Retrying in 10 seconds..."
              sleep 10
            done

            echo "=== Health check failed. Checking logs ==="
            echo "--- Nginx logs ---"
            docker logs groo-nginx --tail 30
            echo "--- Backend logs ---"
            docker logs groo-backend --tail 50
            echo "Application failed to start in 2 minutes."
            exit 1
