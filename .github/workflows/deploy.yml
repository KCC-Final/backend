# 워크플로우의 전체 이름을 정의합니다. GitHub Actions 탭에서 이 이름으로 표시됩니다.
name: Backend CI/CD

# 이 워크플로우가 언제 실행될지를 정의하는 트리거(trigger) 설정입니다.
on:
  # 'main', 'develop' 또는 테스트 브랜치에 코드가 푸시(push)될 때 실행됩니다.
  push:
    branches: [ "main", "develop", "feat/17/CI/CD테스트브랜치" ] # ✅ 테스트 브랜치 추가
  # 'main' 브랜치로 Pull Request가 생성될 때도 실행됩니다. (빌드 테스트 목적)
  pull_request:
    branches: [ "main" ]
    
# 워크플로우를 구성하는 실제 작업(job)들의 목록입니다.
jobs:
  # --- 1단계: 소스 코드를 빌드하여 Docker 이미지로 만들고, Docker Hub에 푸시하는 작업 ---
  build-and-push:
    # 이 작업이 실행될 가상 서버의 OS 환경을 지정합니다. (최신 우분투)
    runs-on: ubuntu-latest
    # 이 작업에서 수행될 단계(step)들을 순서대로 나열합니다.
    steps:
      # 1-1. 레포지토리의 소스 코드를 가상 서버(Runner)의 작업 공간으로 다운로드합니다.
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 1-2. GitHub Secrets에 저장된 정보를 사용하여 Docker Hub에 로그인합니다.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # 1-3. Dockerfile을 사용하여 이미지를 빌드하고, Docker Hub 레지스트리로 푸시합니다.
      # 태그는 'latest'와 고유 식별을 위한 커밋 해시(SHA) 두 가지를 사용합니다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            risania/groo-backend:latest
            risania/groo-backend:${{ github.sha }}

  # --- 2단계: 빌드된 Docker 이미지를 EC2 서버에 배포하는 작업 ---
  deploy:
    # 'needs' 키워드는 'build-and-push' 작업이 성공해야만 이 작업이 실행됨을 명시합니다.
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # 2-1. 레포지토리 코드를 runner에 체크아웃합니다.
      # EC2 서버로 복사할 nginx 설정 파일에 접근하기 위해 반드시 필요합니다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ 2-2. EC2에 nginx 설정 폴더를 생성하고, 파일 복사를 위한 권한을 부여합니다.
      - name: Create nginx directory and grant permission
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # sudo로 디렉토리를 생성하면 소유자가 root가 됩니다.
            sudo mkdir -p /home/ubuntu/groo/nginx
            # scp-action이 'ubuntu' 계정으로 파일을 쓸 수 있도록 디렉토리 소유권을 변경합니다.
            sudo chown -R ubuntu:ubuntu /home/ubuntu/groo/nginx
      # =================================================================
      # ✅ 'Copy' 단계 바로 위에 이 단계를 추가해야 합니다.
      # =================================================================
      - name: Check runner workspace files
        run: |
          echo "--- Runner Workspace Contents ---"
          ls -alR
      # 2-3. 레포지토리의 nginx 설정 파일들을 EC2 서버로 복사합니다.
      # 'source'는 레포지토리 내의 경로, 'target'은 EC2 서버 내의 경로입니다.
      - name: Copy nginx config files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "./nginx/*"  # 레포지토리 루트의 'nginx' 폴더 안 모든 파일
          target: "/home/ubuntu/groo" # EC2의 '/home/ubuntu/groo/nginx' 폴더로 복사
          overwrite: true  # ✅ 기존 파일을 덮어쓰기 허용 (이 줄이 핵심 수정사항)
      # ===============================================================
      # ✅ 아래 디버깅 단계를 여기에 추가해주세요.
      # =================================================================
      - name: Verify copied files on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "--- Checking contents of /home/ubuntu/groo ---"
            ls -alR /home/ubuntu/groo
            echo "--- Checking contents of /home/ubuntu/groo/nginx ---"
            ls -alR /home/ubuntu/groo/nginx
      # 2-4. EC2 서버에 접속하여 컨테이너들을 실행하는 메인 스크립트를 실행합니다.
      - name: Deploy containers to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. 컨테이너들이 서로 통신할 수 있는 가상 네트워크를 생성합니다. (이미 존재하면 넘어갑니다)
            docker network create groo-network || true

            # 2. 배포 과정에서 충돌을 막기 위해 기존에 실행 중이던 모든 컨테이너를 중지하고 삭제합니다.
            docker stop groo-nginx groo-backend groo-mysql groo-redis || true
            docker rm groo-nginx groo-backend groo-mysql groo-redis || true

            # 3. 서버의 디스크 공간을 확보하기 위해 사용되지 않는 오래된 Docker 이미지를 삭제합니다.
            docker image prune -f

            # 4. 1단계에서 빌드하여 Docker Hub에 올린 최신 백엔드 이미지를 다운로드합니다.
            docker pull risania/groo-backend:latest

            # 5. MySQL 데이터베이스 컨테이너를 실행합니다.
            # 볼륨(-v)을 연결하여 컨테이너가 삭제되어도 데이터가 유지되도록 합니다.
            docker run -d \
              --name groo-mysql \
              -p 3306:3306 \
              --network groo-network \
              -v groo-mysql-data:/var/lib/mysql \
              -e MYSQL_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }} \
              -e MYSQL_DATABASE=kcc \
              -e MYSQL_USER=kcc \
              -e MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
              --restart unless-stopped \
              mysql:8.0 --default-authentication-plugin=mysql_native_password

            # 6. Redis 캐시/세션 서버 컨테이너를 실행합니다.
            # 볼륨(-v)을 연결하여 데이터 지속성을 확보합니다.
            docker run -d \
              --name groo-redis \
              -p 6379:6379 \
              --network groo-network \
              -v groo-redis-data:/data \
              --restart unless-stopped \
              redis:7.0-alpine redis-server --appendonly yes --requirepass ${{ secrets.REDIS_PASSWORD }}

            # 7. DB와 Redis가 완전히 준비될 시간을 벌기 위해 15초간 대기합니다.
            echo "Waiting for database and redis to start..."
            sleep 15

            # 8. 스프링 부트 백엔드 애플리케이션 컨테이너를 실행합니다.
            # DB, Redis 접속 정보 등을 환경변수(-e)로 주입합니다.
            docker run -d \
              --name groo-backend \
              --network groo-network \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e spring.datasource.url=jdbc:mysql://groo-mysql:3306/kcc \
              -e spring.datasource.username=kcc \
              -e spring.datasource.password=${{ secrets.DB_PASSWORD }} \
              -e SPRING_DATA_REDIS_HOST=groo-redis \
              -e SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_UPLOAD_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_UPLOAD_SECRET_ACCESS_KEY }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_S3_UPLOAD_BUCKET=${{ secrets.AWS_S3_UPLOAD_BUCKET }} \
              --restart unless-stopped \
              risania/groo-backend:latest

            # 9. 스프링 부트 애플리케이션이 시작될 시간을 벌기 위해 20초간 대기합니다.
            echo "Waiting for application to start..."
            sleep 20

            # 10. Nginx 컨테이너를 실행합니다. 외부의 80, 443 포트 요청을 받습니다.
            # EC2 서버에 복사해 둔 설정 파일들을 Nginx 컨테이너 내부의 올바른 위치로 연결(마운트)합니다.
            docker run -d \
              --name groo-nginx \
              --network groo-network \
              -p 80:80 -p 443:443 \
              -v /home/ubuntu/groo/nginx/nginx.conf:/etc/nginx/nginx.conf \
              -v /home/ubuntu/groo/nginx/default.conf:/etc/nginx/conf.d/default.conf \
              --restart unless-stopped \
              nginx:alpine
            
            # 11. 최종 배포 성공 여부를 확인하기 위한 헬스 체크를 실행합니다.
            # Nginx를 통해 백엔드 앱의 /health 엔드포인트가 정상 응답하는지 2분간 10초 간격으로 확인합니다.
            echo "Waiting for nginx to start..."
            sleep 10
            for i in {1..12}; do
              if curl --fail http://localhost/health; then
                echo "Application started successfully via nginx!"
                exit 0
              fi
              echo "Retrying in 10 seconds..."
              sleep 10
            done
            echo "Application failed to start in 2 minutes."
            exit 1