# ===============================================
# Backend CI/CD 워크플로우
# - main / develop / 테스트 브랜치에 push 시 동작
# - main 브랜치로의 PR 시에도 동작
# - 빌드 → Docker Hub 푸시 → EC2 배포 자동화
# ===============================================

name: Backend CI/CD

on:
  push:
    branches: [ "main", "develop", "feat/17/CI/CD테스트브랜치" ] # ✅ main, develop, 테스트 브랜치에서 push 시 실행
  pull_request:
    branches: [ "main" ] # ✅ main 브랜치로 PR 생성 시 실행 (빌드 테스트 목적)

jobs:
  # ------------------------------------------------------------
  # 1단계: Backend 소스를 Docker 이미지로 빌드하고 Docker Hub에 푸시
  # ------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # (1) 레포지토리 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # (2) Docker Hub 로그인 (Secrets 사용)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # (3) Docker 이미지 빌드 및 푸시
      # latest 태그와 커밋 SHA 태그 두 가지를 함께 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            risania/groo-backend:latest
            risania/groo-backend:${{ github.sha }}

  # ------------------------------------------------------------
  # 2단계: EC2 서버에 배포 (Docker 컨테이너 실행)
  # ------------------------------------------------------------
  deploy:
    needs: build-and-push # ✅ build-and-push 성공 후에만 실행
    runs-on: ubuntu-latest
    steps:
      # (1) 레포지토리 체크아웃 (nginx 설정 파일 접근 위해 필요)
      - name: Checkout repository
        uses: actions/checkout@v4

      # (2) EC2에 nginx 디렉토리 생성 및 권한 부여
      - name: Create nginx directory and grant permission
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sudo mkdir -p /home/ubuntu/groo/nginx
            sudo chown -R ubuntu:ubuntu /home/ubuntu/groo/nginx

      # (3) Runner(액션 서버)에서 현재 작업 디렉토리 구조 확인 (디버깅용)
      - name: Check runner workspace files
        run: |
          echo "--- Runner Workspace Contents ---"
          ls -alR

      # (4) nginx 설정 파일들을 EC2로 복사
      # ✅ nginx 디렉토리 전체를 /home/ubuntu/groo 하위로 전송
      # 결과: /home/ubuntu/groo/nginx/nginx.conf, /home/ubuntu/groo/nginx/default.conf
      - name: Copy nginx config files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "./nginx"   # nginx 디렉토리 전체
          target: "/home/ubuntu/groo"
          overwrite: true     # 기존 파일 덮어쓰기 허용

      # (5) 복사된 파일 확인 (EC2 내부 디렉토리 구조 출력)
      - name: Verify copied files on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "--- Checking contents of /home/ubuntu/groo ---"
            ls -alR /home/ubuntu/groo
            echo "--- Checking contents of /home/ubuntu/groo/nginx ---"
            ls -alR /home/ubuntu/groo/nginx

      # (6) EC2 서버에서 Docker 컨테이너 실행
      - name: Deploy containers to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1) Docker 네트워크 생성 (이미 존재하면 무시)
            docker network create groo-network || true

            # 2) 기존 컨테이너 중지 및 삭제
            docker stop groo-nginx groo-backend groo-mysql groo-redis || true
            docker rm groo-nginx groo-backend groo-mysql groo-redis || true

            # 3) 오래된 이미지 정리
            docker image prune -f

            # 4) 최신 backend 이미지 Pull
            docker pull risania/groo-backend:latest

            # 5) MySQL 컨테이너 실행
            docker run -d \
              --name groo-mysql \
              -p 3306:3306 \
              --network groo-network \
              -v groo-mysql-data:/var/lib/mysql \
              -e MYSQL_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }} \
              -e MYSQL_DATABASE=kcc \
              -e MYSQL_USER=kcc \
              -e MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
              --restart unless-stopped \
              mysql:8.0 --default-authentication-plugin=mysql_native_password

            # 6) Redis 컨테이너 실행
            docker run -d \
              --name groo-redis \
              -p 6379:6379 \
              --network groo-network \
              -v groo-redis-data:/data \
              --restart unless-stopped \
              redis:7.0-alpine redis-server --appendonly yes --requirepass ${{ secrets.REDIS_PASSWORD }}

            # 7) DB와 Redis 기동 대기
            echo "Waiting for database and redis to start..."
            sleep 15

            # 8) Backend(Spring Boot) 컨테이너 실행
            docker run -d \
              --name groo-backend \
              --network groo-network \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e spring.datasource.url=jdbc:mysql://groo-mysql:3306/kcc \
              -e spring.datasource.username=kcc \
              -e spring.datasource.password=${{ secrets.DB_PASSWORD }} \
              -e SPRING_DATA_REDIS_HOST=groo-redis \
              -e SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_UPLOAD_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_UPLOAD_SECRET_ACCESS_KEY }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_S3_UPLOAD_BUCKET=${{ secrets.AWS_S3_UPLOAD_BUCKET }} \
              --restart unless-stopped \
              risania/groo-backend:latest

            # 9) Backend 기동 대기
            echo "Waiting for application to start..."
            sleep 20

            # 10) Nginx 컨테이너 실행 (설정파일 마운트)
            docker run -d \
              --name groo-nginx \
              --network groo-network \
              -p 80:80 -p 443:443 \
              -v /home/ubuntu/groo/nginx/nginx.conf:/etc/nginx/nginx.conf \
              -v /home/ubuntu/groo/nginx/default.conf:/etc/nginx/conf.d/default.conf \
              --restart unless-stopped \
              nginx:alpine

            # 11) 헬스 체크 (최대 2분, 10초 간격)
            echo "Waiting for nginx to start..."
            sleep 10
            for i in {1..12}; do
              if curl --fail http://localhost/health; then
                echo "Application started successfully via nginx!"
                exit 0
              fi
              echo "Retrying in 10 seconds..."
              sleep 10
            done
            echo "Application failed to start in 2 minutes."
            exit 1
