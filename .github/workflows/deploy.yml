# @author uyh
# ===============================================
# Backend CI/CD 워크플로우
# ===============================================

name: Backend CI/CD

on:
  push:
    branches: ["main", "develop", "feat/test"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            risania/groo-backend:latest
            risania/groo-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create nginx and database directories and grant permission
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sudo mkdir -p /home/ubuntu/groo/nginx
            sudo mkdir -p /home/ubuntu/groo/database
            sudo chown -R ubuntu:ubuntu /home/ubuntu/groo

      - name: Copy config files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "nginx/nginx.conf,nginx/default.conf,database/"
          target: "/home/ubuntu/groo"
          overwrite: true

      - name: Verify copied files on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "--- Checking contents of /home/ubuntu/groo ---"
            ls -alR /home/ubuntu/groo

      - name: Deploy containers to EC2
        uses: appleboy/ssh-action@v1.0.0
        env:
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_SMTP_AUTH: ${{ secrets.MAIL_SMTP_AUTH }}
          MAIL_STARTTLS_ENABLE: ${{ secrets.MAIL_STARTTLS_ENABLE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_TOKEN_EXPIRATION: ${{ secrets.EMAIL_TOKEN_EXPIRATION }}
          PASSWORD_TOKEN_EXPIRATION: ${{ secrets.PASSWORD_TOKEN_EXPIRATION }}
          NEXT_PUBLIC_ALADIN_TTBKEY: ${{ secrets.NEXT_PUBLIC_ALADIN_TTBKEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: |
            MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,
            MAIL_SMTP_AUTH,MAIL_STARTTLS_ENABLE,
            JWT_SECRET,EMAIL_TOKEN_EXPIRATION,PASSWORD_TOKEN_EXPIRATION,
            NEXT_PUBLIC_ALADIN_TTBKEY,DB_PASSWORD,DB_ROOT_PASSWORD,REDIS_PASSWORD
          script: |
            set -e
            echo "=============================="
            echo "🚀 배포 스크립트 시작"
            echo "현재 시간: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=============================="

            echo "🧹 기존 컨테이너 정리 및 네트워크 확인"
            docker ps -a
            docker network ls || true

            echo "🔧 네트워크 생성 (이미 존재 시 무시)"
            docker network create groo-network || true

            echo "🛑 기존 컨테이너 중지/삭제"
            docker stop groo-nginx groo-backend groo-mysql groo-redis 2>/dev/null || true
            docker rm groo-nginx groo-backend groo-mysql groo-redis 2>/dev/null || true

            echo "🧽 오래된 이미지 정리"
            docker image prune -f || true

            echo "🐋 최신 backend 이미지 Pull"
            docker pull risania/groo-backend:latest

            echo "📦 MySQL 실행"
            docker run -d --name groo-mysql --network groo-network \
              -p 3306:3306 -v groo-mysql-data:/var/lib/mysql \
              -e MYSQL_ROOT_PASSWORD='${{ secrets.DB_ROOT_PASSWORD }}' \
              -e MYSQL_DATABASE=kcc -e MYSQL_USER=kcc \
              -e MYSQL_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              --restart unless-stopped mysql:8.0 \
              --default-authentication-plugin=mysql_native_password \
              --character-set-server=utf8mb4 \
              --collation-server=utf8mb4_unicode_ci

            echo "📦 Redis 실행"
            docker run -d --name groo-redis --network groo-network \
              -p 6379:6379 -v groo-redis-data:/data \
              -e TZ=Asia/Seoul --restart unless-stopped \
              redis:7.0-alpine redis-server --appendonly yes

            echo "⏳ DB와 Redis 기동 대기 중..."
            sleep 15
            docker ps -a | grep groo || echo "❌ 컨테이너가 정상적으로 뜨지 않았습니다"

            echo "🔥 Backend 실행"
            DB_URL="jdbc:mysql://groo-mysql:3306/kcc?useUnicode=true&serverTimezone=Asia/Seoul"
            docker run -d --name groo-backend --network groo-network \
              -p 8080:8080 -e TZ=Asia/Seoul -e SPRING_PROFILES_ACTIVE=prod \
              -e "spring.datasource.url=${DB_URL}" \
              -e spring.datasource.username=kcc \
              -e "spring.datasource.password=${{ secrets.DB_PASSWORD }}" \
              -e SPRING_DATA_REDIS_HOST=groo-redis \
              -e "SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" \
              -e MAIL_HOST="${MAIL_HOST}" -e MAIL_PORT="${MAIL_PORT}" \
              -e MAIL_USERNAME="${MAIL_USERNAME}" -e MAIL_PASSWORD="${MAIL_PASSWORD}" \
              -e MAIL_SMTP_AUTH="${MAIL_SMTP_AUTH}" -e MAIL_STARTTLS_ENABLE="${MAIL_STARTTLS_ENABLE}" \
              -e JWT_SECRET="${JWT_SECRET}" \
              -e EMAIL_TOKEN_EXPIRATION="${EMAIL_TOKEN_EXPIRATION}" \
              -e PASSWORD_TOKEN_EXPIRATION="${PASSWORD_TOKEN_EXPIRATION}" \
              -e NEXT_PUBLIC_ALADIN_TTBKEY="${NEXT_PUBLIC_ALADIN_TTBKEY}" \
              --restart unless-stopped risania/groo-backend:latest

            echo "🕒 Backend 기동 대기"
            sleep 20
            echo "=== Backend 상태 ==="
            docker ps -a | grep groo-backend || true
            echo "=== Backend 로그 (최근 40줄) ==="
            docker logs groo-backend --tail 40 || true

            echo "📡 Backend 내부 curl 테스트"
            docker exec groo-backend curl -v --max-time 5 http://localhost:8080/api/health || echo "❌ Backend 내부 요청 실패"

            echo "=== DB 연결 확인 ==="
            docker exec groo-mysql mysqladmin -uroot -p'${{ secrets.DB_ROOT_PASSWORD }}' ping || echo "❌ MySQL 연결 실패"

            echo "=== Redis 연결 확인 ==="
            docker exec groo-redis redis-cli ping || echo "❌ Redis 연결 실패"

            echo "📜 Nginx 실행"
            docker run -d --name groo-nginx --network groo-network \
              -p 80:80 -p 443:443 \
              -v /home/ubuntu/groo/nginx/nginx.conf:/etc/nginx/nginx.conf \
              -v /home/ubuntu/groo/nginx/default.conf:/etc/nginx/conf.d/default.conf \
              --restart unless-stopped nginx:alpine

            echo "🕒 Nginx 기동 대기 중..."
            sleep 10

            echo "🔍 nginx 로그 (최근 30줄)"
            docker logs groo-nginx --tail 30 || true

            echo "🌐 nginx → backend 연결 테스트"
            curl -v --max-time 10 http://localhost/api/health || echo "❌ nginx 경유 요청 실패"

            echo "=============================="
            echo "✅ 배포 스크립트 종료"
            echo "=============================="
