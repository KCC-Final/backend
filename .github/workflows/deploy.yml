# 워크플로우 이름
name: Backend CI/CD

# main 또는 develop 브랜치에 push될 때 실행
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
    
jobs:
  # --- 1단계: 빌드 및 Docker Hub 푸시 ---
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 소스 코드를 체크아웃합니다.
      - uses: actions/checkout@v4
      
      # Docker Hub에 로그인합니다. GitHub Secrets에 저장된 정보를 사용합니다.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # 이미지 태그를 latest와 Git Commit SHA로 구체화합니다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            risania/groo-backend:latest
            risania/groo-backend:${{ github.sha }}

  # --- 2단계: EC2 서버에 배포 ---
  deploy:
    # build-and-push 작업이 성공해야만 실행됩니다.
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. nginx 설정 디렉토리 및 파일 생성
            mkdir -p /home/ubuntu/groo/nginx
            
            # nginx.conf 생성
            cat > /home/ubuntu/groo/nginx.conf << 'EOF'
            user nginx;
            worker_processes auto;
            error_log /var/log/nginx/error.log notice;
            pid /var/run/nginx.pid;
            
            events {
                worker_connections 1024;
            }
            
            http {
                include /etc/nginx/mime.types;
                default_type application/octet-stream;
                
                log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                                '$status $body_bytes_sent "$http_referer" '
                                '"$http_user_agent" "$http_x_forwarded_for"';
                
                access_log /var/log/nginx/access.log main;
                sendfile on;
                tcp_nopush on;
                keepalive_timeout 65;
                gzip on;
                
                include /etc/nginx/conf.d/*.conf;
            }
            EOF
            
            # default.conf 생성  
            cat > /home/ubuntu/groo/nginx/default.conf << 'EOF'
            server {
                listen 80;
                server_name localhost;
                
                # ALB 헬스체크 전용 경로
                location /health {
                    proxy_pass http://groo-backend:8080/actuator/health;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
                
                # 정보나루 Open API 프록시 설정
                location /api/library/ {
                    proxy_pass http://data4library.kr/api/;
                    proxy_set_header Host data4library.kr;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    
                    add_header 'Access-Control-Allow-Origin' '*' always;
                    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                }
                
                # 알라딘 Open API 프록시 설정
                location /api/aladin/ {
                    proxy_pass http://www.aladin.co.kr/ttb/api/;
                    proxy_set_header Host www.aladin.co.kr;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    
                    add_header 'Access-Control-Allow-Origin' '*' always;
                    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                }
                
                # 백엔드 Spring Boot API 프록시 설정
                location /api/ {
                    proxy_pass http://groo-backend:8080/;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
                
                # 정적 파일 서빙
                location / {
                    root /usr/share/nginx/html;
                    index index.html index.htm;
                    try_files $uri $uri/ /index.html;
                }
                
                error_page 500 502 503 504 /50x.html;
                location = /50x.html {
                    root /usr/share/nginx/html;
                }
            }
            EOF

            # 2. 가상 네트워크 생성 (이미 있으면 에러 없이 넘어감)
            docker network create groo-network || true

            # 3. 기존 컨테이너들 중지 및 삭제
            docker stop groo-nginx || true
            docker rm groo-nginx || true
            docker stop groo-backend || true
            docker rm groo-backend || true
            docker stop groo-mysql || true
            docker rm groo-mysql || true
            docker stop groo-redis || true
            docker rm groo-redis || true

            # 4. 사용하지 않는 이전 Docker 이미지 정리 (선택 사항)
            docker image prune -f

            # 5. Docker Hub에서 최신 백엔드 이미지 다운로드
            docker pull risania/groo-backend:latest

            # 6. MySQL DB 컨테이너 실행
            docker run -d \
              --name groo-mysql \
              -p 3306:3306 \
              --network groo-network \
              -v groo-mysql-data:/var/lib/mysql \
              -e MYSQL_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }} \
              -e MYSQL_DATABASE=kcc \
              -e MYSQL_USER=kcc \
              -e MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
              --restart unless-stopped \
              mysql:8.0 --default-authentication-plugin=mysql_native_password

            # 7. Redis 컨테이너 실행 (토큰 캐싱용)
            docker run -d \
              --name groo-redis \
              -p 6379:6379 \
              --network groo-network \
              -v groo-redis-data:/data \
              --restart unless-stopped \
              redis:7.0-alpine redis-server --appendonly yes --requirepass ${{ secrets.REDIS_PASSWORD }}

            # 8. DB와 Redis가 완전히 시작될 때까지 대기
            echo "Waiting for database and redis to start..."
            sleep 15

            # 9. 백엔드 애플리케이션 컨테이너 실행
            docker run -d \
              --name groo-backend \
              --network groo-network \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e spring.datasource.url=jdbc:mysql://groo-mysql:3306/kcc \
              -e spring.datasource.username=kcc \
              -e spring.datasource.password=${{ secrets.DB_PASSWORD }} \
              -e spring.data.redis.host=groo-redis \
              -e spring.data.redis.password=${{ secrets.REDIS_PASSWORD }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_UPLOAD_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_UPLOAD_SECRET_ACCESS_KEY }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_S3_UPLOAD_BUCKET=${{ secrets.AWS_S3_UPLOAD_BUCKET }} \
              --restart unless-stopped \
              risania/groo-backend:latest

            # 10. 애플리케이션이 시작될 때까지 대기
            echo "Waiting for application to start..."
            sleep 20

            # 11. nginx 컨테이너 실행
            docker run -d \
              --name groo-nginx \
              --network groo-network \
              -p 80:80 -p 443:443 \
              -v /home/ubuntu/groo/nginx.conf:/etc/nginx/nginx.conf \
              -v /home/ubuntu/groo/nginx/default.conf:/etc/nginx/conf.d/default.conf \
              --restart unless-stopped \
              nginx:alpine
            
            # 12. 배포 확인 (nginx를 통한 health check)
            echo "Waiting for nginx to start..."
            sleep 10
            for i in {1..12}; do
              if curl --fail http://localhost/health; then
                echo "Application started successfully via nginx!"
                exit 0
              fi
              echo "Retrying in 10 seconds..."
              sleep 10
            done
            echo "Application failed to start in 2 minutes."
            exit 1