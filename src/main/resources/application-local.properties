# ===============================================
# 로컬 개발 환경 프로파일 (local)
# IDE에서 직접 실행 시 사용
# ===============================================
spring.datasource.url=jdbc:mysql://localhost:3306/kcc?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=kcc
spring.datasource.password=kcc
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 로컬 환경 Redis 설정
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=kccfinal
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# 로컬 swagger 설정
swagger.server.url=http://localhost:8080
swagger.server.description=로컬 개발 서버
cors.allowed-origins=http://localhost:3000,http://localhost:8080