# ??? ??: MySQL ?? ?? (??? ??)
spring.datasource.url=jdbc:mysql://groo-mysql:3306/kcc?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
spring.datasource.username=${spring.datasource.username}
spring.datasource.password=${spring.datasource.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? ?? ?? (?? ????? Mapper ?? ???)
logging.level.com.kcc.kcc.mapper=WARN

# ===============================================
# Redis ?? (?????? ??? ? ???? ??)
# ===============================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# ===============================================
# Actuator / Health Check ??
# ===============================================
management.endpoints.web.exposure.include=health,env,info
management.endpoint.env.show-values=always

# ===============================================
# Swagger ? CORS ??
# ===============================================
swagger.server.url=https://groo.site
swagger.server.description=Production Server
cors.allowed-origins=https://groo.site

# ===============================================
# ?? ??
# ===============================================
cookie.domain=.groo.site
cookie.secure=true
cookie.same-site=None

# ===============================================
# Mail (SMTP) ??
# ===============================================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE}

# ===============================================
# Jackson & Hibernate ??? ??
# (API ?? ? DB ?? ?? KST ???? ??)
# ===============================================
spring.jackson.time-zone=Asia/Seoul
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul