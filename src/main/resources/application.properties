# ===============================================
# 공통 설정 (모든 프로파일에 적용)
# ===============================================
# .env
spring.config.import=optional:file:.env[.properties]

# 기본으로 활성화할 프로파일을 'local'로 지정
spring.profiles.active=local

# MyBatis를 사용하므로 JPA 최소 설정
spring.jpa.hibernate.ddl-auto=none

server.port=8080

# SQL 로그를 더 자세히 보기 위한 설정
logging.level.com.kcc.kcc.mapper=DEBUG

# Actuator health endpoint 노출
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# MyBatis 설정
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.kcc.groo

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.use-generated-keys=true
mybatis.configuration.default-time-zone=Asia/Seoul

mybatis.configuration.log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


# Swagger/OpenAPI 설정
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# JPA 설정 (쿼리문 확인용)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Cache 설정
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=groo:cache:

# 그루 프로젝트 토큰
groo.token.email-verification-expiration=${EMAIL_TOKEN_EXPIRATION}
groo.token.password-reset-expiration=${PASSWORD_TOKEN_EXPIRATION}
jwt.secret=${JWT_SECRET}

# Email sender 설정
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#알라딘
aladin.ttbkey=${NEXT_PUBLIC_ALADIN_TTBKEY}

# UTF-8 인코딩 설정
spring.mvc.locale=ko_KR
spring.web.locale=ko_KR
spring.messages.encoding=UTF-8
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true


# 타임존 설정 (한국 시간 KST, UTC+9)
spring.jackson.time-zone=Asia/Seoul
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB