# .env
spring.config.import=optional:file:.env[.properties]

# ???? ???? ????? 'local'? ??
spring.profiles.active=local

# MyBatis? ????? JPA ?? ??
spring.jpa.hibernate.ddl-auto=none

server.port=8080

# SQL ??? ? ??? ?? ?? ??
logging.level.com.kcc.kcc.mapper=DEBUG

# Actuator health endpoint ??
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# MyBatis ??
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.kcc.groo

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.use-generated-keys=true
mybatis.configuration.default-time-zone=Asia/Seoul

mybatis.configuration.log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


# Swagger/OpenAPI ??
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# JPA ?? (??? ???)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Cache ??
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=groo:cache:

# ?? ???? ??
groo.token.email-verification-expiration=${EMAIL_TOKEN_EXPIRATION}
groo.token.password-reset-expiration=${PASSWORD_TOKEN_EXPIRATION}
jwt.secret=${JWT_SECRET}

# Email sender ??
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#???
aladin.ttbkey=${NEXT_PUBLIC_ALADIN_TTBKEY}

# UTF-8 ??? ??
spring.mvc.locale=ko_KR
spring.web.locale=ko_KR
spring.messages.encoding=UTF-8
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true


# ??? ?? (?? ?? KST, UTC+9)
spring.jackson.time-zone=Asia/Seoul
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB