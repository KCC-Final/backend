# ===============================================
# 공통 설정 (모든 프로파일에 적용)
# ===============================================
# 기본으로 활성화할 프로파일을 'local'로 지정
spring.profiles.active=local

# MyBatis를 사용하므로 JPA 최소 설정
spring.jpa.hibernate.ddl-auto=none

server.port=8080

# SQL 로그를 더 자세히 보기 위한 설정
logging.level.com.kcc.kcc.mapper=DEBUG

# Actuator health endpoint 노출
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# MyBatis 설정
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.kcc.groo

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.use-generated-keys=true

# Swagger/OpenAPI 설정
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# MySQL 설정
#spring.datasource.url=jdbc:mysql://localhost:3306/users?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul
#spring.datasource.username=root
#spring.datasource.password=1234
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정 (쿼리문 확인용)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis 설정 (토큰 캐싱용)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=kccfinal
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# Spring Cache 설정
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=groo:cache:

# 그루 프로젝트 토큰 만료 시간 설정
groo.token.email-verification-expiration=300000
groo.token.jwt-access-expiration=900000
groo.token.jwt-refresh-expiration=604800000
groo.token.session-timeout=86400000
groo.token.password-reset-expiration=1800000