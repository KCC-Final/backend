# ===============================================
# Docker 로컬 환경 프로파일 (docker)
# docker-compose up 실행 시 사용
# ===============================================
spring.datasource.url=jdbc:mysql://db:3306/kcc?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=kcc
spring.datasource.password=kcc
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Docker 환경에서도 clean 허용 (개발용)
spring.flyway.clean-disabled=false

# Docker 환경 Redis 설정
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=kccfinal