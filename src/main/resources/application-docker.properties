# ===============================================
# Docker 로컬 환경 프로파일 (docker)
# docker-compose up 실행 시 사용
# ===============================================
spring.datasource.url=jdbc:mysql://db:3306/kcc?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=kcc
spring.datasource.password=kcc
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Docker 환경 Redis 설정
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# Docker swagger 설정
swagger.server.url=http://localhost
swagger.server.description=Docker 개발 서버
cors.allowed-origins=http://localhost:3000,http://localhost

# cookie 설정
cookie.domain=
cookie.secure=false
cookie.same-site=Lax

# Hot Reload 설정
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true