version: "3.8"

services:
  # -----------------------------------------------------------------
  # DB 서비스 (MySQL 8.0) - 기존 코드 그대로 유지
  # -----------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: kcc-local-mysql
    restart: unless-stopped
    env_file:
      - ./db.env # 🔑 DB 설정을 별도 파일로 분리합니다.
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kcc-network
    command: --default-authentication-plugin=mysql_native_password

  # -----------------------------------------------------------------
  # Redis 서비스 (토큰 캐싱용) - 기존 코드 그대로 유지
  # -----------------------------------------------------------------
  redis:
    image: redis:7.0-alpine
    container_name: groo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kcc-network
    command: redis-server --appendonly yes --requirepass kccfinal

  # =================================================================
  # 🚀 배포(Production) 환경 서비스 - 기존 'app' 서비스
  # =================================================================
  app:
    build: . # 현재 Dockerfile을 사용하여 최종 .jar 파일로 이미지를 빌드합니다.
    container_name: kcc-prod-app
    restart: unless-stopped
    env_file:
      - ./.env # 🍀 배포용 환경변수 파일을 지정합니다.
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    networks:
      - kcc-network

  # =================================================================
  # 🚗 개발(Development) 환경 서비스 - 기존 코드 그대로 유지
  # =================================================================
  app-dev:
    image: gradle:8.7.0-jdk21 # JDK와 Gradle이 포함된 이미지를 직접 사용합니다.
    container_name: kcc-dev-app
    volumes:
      - .:/app # 📂 로컬 소스코드 전체를 컨테이너와 실시간으로 연결합니다.
    working_dir: /app # 컨테이너의 작업 디렉토리를 설정합니다.
    command: "./gradlew bootRun" # 🔄 Gradle로 직접 개발 서버를 실행하여 핫 리로딩을 활성화합니다.
    env_file:
      - ./.env # 🍀 개발용 환경변수 파일을 지정합니다.
    ports:
      - "8081:8080" # 포트 충돌을 피하려면 app 서비스와 동시에 실행하지 마세요.
    depends_on:
      - db
      - redis
    networks:
      - kcc-network

  # =================================================================
  # 🌐 nginx 리버스 프록시 서비스 (새로 추가)
  # =================================================================
  nginx:
    # nginx 알파인 이미지 사용 (경량화)
    image: nginx:alpine
    container_name: kcc-nginx
    restart: unless-stopped
    ports:
      # HTTP 포트 80을 호스트에 노출
      - "80:80"
      # HTTPS 포트 443도 미리 노출 (SSL 인증서 추가시 사용)
      - "443:443"
    volumes:
      # 커스텀 nginx 설정 파일들을 컨테이너에 마운트
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # nginx 로그를 호스트에 저장 (모니터링용)
      - ./logs:/var/log/nginx
    depends_on:
      # Spring Boot 앱이 먼저 실행되어야 함
      - app
    networks:
      # 다른 컨테이너들과 동일한 네트워크 사용
      - kcc-network

# =================================================================
# 볼륨 및 네트워크 설정 (Redis 볼륨 추가)
# =================================================================
volumes:
  mysql_data:    # MySQL 데이터 영속화
  redis_data:    # Redis 데이터 영속화

networks:
  kcc-network:
    driver: bridge