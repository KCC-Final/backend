version: "3.8"

services:
  # -----------------------------------------------------------------
  # DB 서비스 (MySQL 8.0)
  # -----------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: kcc-local-mysql
    restart: unless-stopped
    env_file:
      - ./db.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kcc-network
    command: --default-authentication-plugin=mysql_native_password

  # -----------------------------------------------------------------
  # Redis 서비스 (토큰 캐싱용) - 비밀번호 제거 + 포트 바인딩 추가
  # -----------------------------------------------------------------
  redis:
    image: redis:7.0-alpine
    container_name: groo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # 로컬에서도 localhost:6379 접근 가능
    volumes:
      - redis_data:/data
    networks:
      - kcc-network
    command: ["redis-server", "--appendonly", "yes"]

  # =================================================================
  # Production backend (jar 빌드 이미지)
  # =================================================================
  groo-backend:
    build: .
    container_name: kcc-prod-app
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    networks:
      - kcc-network

  # =================================================================
  # Development backend (gradle bootRun)
  # =================================================================
  groo-backend-dev:
    image: gradle:8.7.0-jdk21
    container_name: kcc-dev-app
    volumes:
      - .:/app
    working_dir: /app
    command: "./gradlew bootRun"
    env_file:
      - ./.env
    ports:
      - "8081:8080"
    depends_on:
      - db
      - redis
    networks:
      - kcc-network

  # =================================================================
  # nginx reverse proxy
  # =================================================================
  nginx:
    image: nginx:alpine
    container_name: kcc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs:/var/log/nginx
    depends_on:
      - groo-backend
    networks:
      - kcc-network

volumes:
  mysql_data:
  redis_data:

networks:
  kcc-network:
    driver: bridge
