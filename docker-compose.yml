version: "3.8"

services:
  # -----------------------------------------------------------------
  # MySQL 8.0 (kcc-local-mysql)
  # -----------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: kcc-local-mysql
    restart: unless-stopped
    env_file:
      - ./db.env
    environment:
      TZ: Asia/Seoul # 추가
    ports:
      - "3306:3306" # 호스트 포트 3306 → 컨테이너 3306
    volumes:
      - mysql_data:/var/lib/mysql # MySQL 데이터는 볼륨에 영구 저장
    networks:
      - kcc-network
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --default-time-zone=+09:00 # 추가

  # -----------------------------------------------------------------
  # Redis (groo-redis)
  # -----------------------------------------------------------------
  redis:
    image: redis:7.0-alpine
    container_name: groo-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul # 추가
    ports:
      - "6379:6379" # 로컬에서 localhost:6379로 접근 가능
    volumes:
      - redis_data:/data # Redis 데이터 영구 저장
    networks:
      - kcc-network
    command: ["redis-server", "--appendonly", "yes"]

  # -----------------------------------------------------------------
  # Migration 서비스 (init_codes.sql + migration_*.sql 실행)
  # -----------------------------------------------------------------
  migrator:
    image: mysql:8.0
    container_name: kcc-migrator
    depends_on:
      - db
    environment:
      TZ: Asia/Seoul # 추가
    volumes:
      - ./database:/database
    networks:
      - kcc-network
    entrypoint: >
      bash -c "
        echo '⏳ Waiting for MySQL to be ready...' &&
        until mysqladmin ping -hdb -ukcc -p\$$MYSQL_PASSWORD --silent; do
          sleep 2;
        done &&
        
        # UTF-8 설정 확인
        mysql -hdb -ukcc -p\$$MYSQL_PASSWORD -e 'SET NAMES utf8mb4;' &&
        
        echo '🚀 Running init and migrations as kcc...' &&

        if [ -f /database/init_codes.sql ]; then
          echo 'Applying init_codes.sql...';
          mysql -hdb -ukcc -p\$$MYSQL_PASSWORD \$$MYSQL_DATABASE --default-character-set=utf8mb4 < /database/init_codes.sql;
        else
          echo 'No init_codes.sql found, skipping...';
        fi &&

        if ls /database/migration_*.sql 1> /dev/null 2>&1; then
          for f in /database/migration_*.sql; do
            echo \"Applying migration: \$$f\";
            mysql -hdb -ukcc -p\$$MYSQL_PASSWORD \$$MYSQL_DATABASE --default-character-set=utf8mb4 < \$$f;
          done
        else
          echo 'No migration files found, skipping...';
        fi &&

        echo ' All migrations applied.'
      "
    env_file:
      - ./db.env

  # -----------------------------------------------------------------
  # Backend (Production profile)
  # -----------------------------------------------------------------
  groo-backend:
    build: .
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul # 추가
    env_file:
      - ./.env
    ports:
      - "8081:8080"
    depends_on:
      - db
      - redis
      - migrator #  마이그레이션이 끝난 후 실행
    networks:
      - kcc-network

  # -----------------------------------------------------------------
  # Backend (Development profile - gradle bootRun)
  # -----------------------------------------------------------------
  groo-backend-dev:
    image: gradle:8.7.0-jdk21
    environment:
      TZ: Asia/Seoul # 추가
    volumes:
      - .:/app
    working_dir: /app
    command: "./gradlew bootRun"
    env_file:
      - ./.env
    ports:
      - "8082:8080"
    depends_on:
      - db
      - redis
      - migrator
    networks:
      - kcc-network

  # -----------------------------------------------------------------
  # Nginx Reverse Proxy
  # -----------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: kcc-nginx
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul # 추가
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs:/var/log/nginx
    networks:
      - kcc-network

volumes:
  mysql_data:
  redis_data:

networks:
  kcc-network:
    driver: bridge