services:
  # -----------------------------------------------------------------
  # MySQL 8.0
  # -----------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: groo-mysql
    restart: unless-stopped
    env_file:
      - ./db.env
    environment:
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kcc-network
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --skip-character-set-client-handshake
      - --default-time-zone=+09:00
      - --ngram_token_size=2

  # -----------------------------------------------------------------
  # Redis
  # -----------------------------------------------------------------
  redis:
    image: redis:7.0-alpine
    container_name: groo-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kcc-network
    command: ["redis-server", "--appendonly", "yes"]

  # -----------------------------------------------------------------
  # Migration 서비스
  # -----------------------------------------------------------------
  migrator:
    image: mysql:8.0
    container_name: kcc-migrator
    depends_on:
      - db
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./database:/database
    networks:
      - kcc-network
    entrypoint: >
      bash -c "
        echo 'Waiting for MySQL to be ready...' &&
        until mysqladmin ping -hdb -ukcc -p\$$MYSQL_PASSWORD --silent; do
          sleep 2;
        done &&

        mysql -hdb -ukcc -p\$$MYSQL_PASSWORD -e 'SET NAMES utf8mb4;' &&

        echo 'Running init and migrations as kcc...' &&

        if [ -f /database/init_codes.sql ]; then
          echo 'Applying init_codes.sql...';
          mysql -hdb -ukcc -p\$$MYSQL_PASSWORD \$$MYSQL_DATABASE --default-character-set=utf8mb4 < /database/init_codes.sql;
        else
          echo 'No init_codes.sql found, skipping...';
        fi &&

        if ls /database/migration_*.sql 1> /dev/null 2>&1; then
          for f in /database/migration_*.sql; do
            echo \"Applying migration: \$$f\";
            mysql -hdb -ukcc -p\$$MYSQL_PASSWORD \$$MYSQL_DATABASE --default-character-set=utf8mb4 < \$$f;
          done
        else
          echo 'No migration files found, skipping...';
        fi &&

        echo 'All migrations applied.'
      "
    env_file:
      - ./db.env

  # -----------------------------------------------------------------
  # Backend (Production profile)
  # -----------------------------------------------------------------
  groo-backend:
    build: .
    container_name: groo-backend
    restart: unless-stopped
    env_file:
      - ./.env  # 다시 추가
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: "-Duser.timezone=Asia/Seoul"
      # GitHub Secrets 값이 deploy.yml에서 주입될 부분
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_STARTTLS_ENABLE: ${MAIL_STARTTLS_ENABLE}

      JWT_SECRET: ${JWT_SECRET}
      EMAIL_TOKEN_EXPIRATION: ${EMAIL_TOKEN_EXPIRATION}
      PASSWORD_TOKEN_EXPIRATION: ${PASSWORD_TOKEN_EXPIRATION}
      NEXT_PUBLIC_ALADIN_TTBKEY: ${NEXT_PUBLIC_ALADIN_TTBKEY}
    ports:
      - "8081:8080"
    depends_on:
      - db
      - redis
      - migrator
    networks:
      - kcc-network

  # -----------------------------------------------------------------
  # Backend (Development profile - gradle bootRun)
  # -----------------------------------------------------------------
  groo-backend-dev:
    image: gradle:8.7.0-jdk21
    container_name: groo-backend-dev
    environment:
      TZ: Asia/Seoul
    volumes:
      - .:/app
    working_dir: /app
    command: "./gradlew bootRun"
    env_file:
      - ./.env
    ports:
      - "8082:8080"
    depends_on:
      - db
      - redis
      - migrator
    networks:
      - kcc-network

  # -----------------------------------------------------------------
  # Nginx Reverse Proxy
  # -----------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: kcc-nginx
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs:/var/log/nginx
    networks:
      - kcc-network
    depends_on:
      - groo-backend

volumes:
  mysql_data:
  redis_data:

networks:
  kcc-network:
    driver: bridge